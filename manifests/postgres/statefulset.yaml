# ==========================================================
# PostgreSQL StatefulSet
# ==========================================================

apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgres
  namespace: taskapp
  labels:
    app: postgres
    tier: database

spec:
  serviceName: postgres

  replicas: 1

  selector:
    matchLabels:
      app: postgres
      tier: database

  template:
    metadata:
      labels:
        app: postgres
        tier: database

    spec:
      containers:
        - name: postgres

          image: postgres:16-alpine

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5432

          # ==================================================
          # Environment Variables
          # ==================================================

          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: taskapp-config
                  key: POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: taskapp-config
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: taskapp-secret
                  key: POSTGRES_PASSWORD

          # ==================================================
          # Persistent Storage
          # ==================================================

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

          # ==================================================
          # Resource Requests & Limits
          # ==================================================

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          # ==================================================
          # Startup Probe
          # ==================================================

          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)

            periodSeconds: 10
            failureThreshold: 30

          # ==================================================
          # Readiness Probe
          # ==================================================

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)

            initialDelaySeconds: 10
            periodSeconds: 10

          # ==================================================
          # Liveness Probe
          # ==================================================

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)

            initialDelaySeconds: 30
            periodSeconds: 20

  # ==========================================================
  # Persistent Volume Claim
  # ==========================================================

  volumeClaimTemplates:
    - metadata:
        name: postgres-storage

      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 5Gi
