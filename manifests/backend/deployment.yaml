spec:
  topologySpreadConstraints: ...

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000

  containers:
    - name: backend
      image: ghcr.io/joshpanamera/taskapp-backend:v3
      imagePullPolicy: Always

      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault

      ports:
        - containerPort: 5000

      envFrom:
        - secretRef:
            name: taskapp-secret
        - configMapRef:
            name: taskapp-config

      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

      readinessProbe:
        httpGet:
          path: /api/health
          port: 5000
        initialDelaySeconds: 15
        periodSeconds: 10

      livenessProbe:
        httpGet:
          path: /api/health
          port: 5000
        initialDelaySeconds: 30
        periodSeconds: 20

      startupProbe:
        httpGet:
          path: /api/health
          port: 5000
        failureThreshold: 30
        periodSeconds: 5
