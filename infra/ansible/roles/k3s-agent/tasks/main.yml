---
# ==========================================================
# Install K3s Agent (Worker Node)
# ==========================================================

- name: Install k3s agent
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    K3S_URL="https://{{ hostvars[groups['server'][0]].ansible_default_ipv4.address }}:6443" \
    K3S_TOKEN="{{ hostvars[groups['server'][0]].k3s_server_token | trim }}" \
    sh -
  args:
    creates: /usr/local/bin/k3s-agent

# ==========================================================
# Ensure k3s-agent service is enabled and running
# ==========================================================

- name: Ensure k3s-agent service is enabled and running
  ansible.builtin.service:
    name: k3s-agent
    state: started
    enabled: true
